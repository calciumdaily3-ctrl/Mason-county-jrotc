<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brigadier General Charles Young JROTC Battalion - Mason County High School</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--navy:#1a237e;
--gold:#ffd700;
--white:#ffffff;
--dark-navy:#0d1642;
--light-gold:#ffed4e;
}

html,body{
min-height:100%;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
line-height:1.6;
color:#333;
background:linear-gradient(135deg,var(--dark-navy) 0%,var(--navy) 100%);
}

.container{
max-width:1200px;
margin:0 auto;
padding:0 20px;
}

.hero{
background:linear-gradient(rgba(26,35,126,.8),rgba(13,22,66,.9));
color:white;
padding:100px 0;
text-align:center;
position:relative;
}

.hero h1{
font-size:3.5rem;
margin-bottom:20px;
text-transform:uppercase;
letter-spacing:3px;
text-shadow:2px 2px 4px rgba(0,0,0,.3);
}

.hero .subtitle{
font-size:1.5rem;
color:var(--gold);
margin-bottom:30px;
font-weight:300;
}

.hero .motto{
font-size:1.2rem;
font-style:italic;
border-top:2px solid var(--gold);
border-bottom:2px solid var(--gold);
padding:20px;
display:inline-block;
margin-top:20px;
}

nav{
background:rgba(255,255,255,.95);
padding:15px 0;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 20px rgba(0,0,0,.1);
}

nav ul{
list-style:none;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
}

nav a{
text-decoration:none;
color:var(--navy);
font-weight:600;
text-transform:uppercase;
letter-spacing:1px;
}

nav a:hover{
color:var(--gold);
}

section{
background:white;
margin:40px auto;
padding:60px 40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
max-width:1000px;
}

h2{
color:var(--navy);
font-size:2.5rem;
margin-bottom:30px;
position:relative;
display:inline-block;
}

h2::after{
content:'';
position:absolute;
bottom:-10px;
left:0;
width:60px;
height:4px;
background:var(--gold);
border-radius:2px;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);
padding:30px;
border-radius:15px;
border-left:5px solid var(--gold);
}

.card h3{
color:var(--navy);
margin-bottom:15px;
font-size:1.3rem;
}

.card-icon{
font-size:2.5rem;
margin-bottom:15px;
display:block;
}

.stats{
background:var(--navy);
color:white;
text-align:center;
}

.stats h2{
color:white;
}

.stats h2::after{
background:var(--gold);
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:40px;
margin-top:40px;
}

.stat-item{
padding:20px;
}

.stat-number{
font-size:3rem;
font-weight:bold;
color:var(--gold);
display:block;
margin-bottom:10px;
}

.stat-label{
font-size:1.1rem;
text-transform:uppercase;
letter-spacing:2px;
}

.contact-info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:30px;
}

.contact-card{
background:var(--navy);
color:white;
padding:30px;
border-radius:15px;
text-align:center;
border:2px solid transparent;
}

.contact-card:hover{
border-color:var(--gold);
}

.contact-card h3{
color:var(--gold);
margin-bottom:15px;
}

footer{
background:var(--dark-navy);
color:white;
text-align:center;
padding:40px 20px;
margin-top:60px;
}

.footer-content{
max-width:800px;
margin:0 auto;
}

.social-links{
margin:20px 0;
}

.social-links a{
display:inline-block;
width:50px;
height:50px;
background:var(--navy);
color:var(--gold);
border-radius:50%;
line-height:50px;
margin:0 10px;
text-decoration:none;
font-weight:bold;
border:2px solid var(--gold);
}

.btn{
display:inline-block;
padding:15px 40px;
background:var(--gold);
color:var(--navy);
text-decoration:none;
border-radius:50px;
font-weight:bold;
text-transform:uppercase;
margin-top:20px;
border:3px solid var(--gold);
}

.btn-outline{
background:transparent;
color:var(--gold);
margin-left:15px;
}

.timeline{
position:relative;
padding-left:30px;
border-left:3px solid var(--gold);
margin-top:30px;
}

.timeline-item{
margin-bottom:30px;
position:relative;
}

.timeline-content{
background:#f8f9fa;
padding:20px;
border-radius:10px;
margin-top:10px;
}

.instructor-card{
background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);
padding:30px;
border-radius:15px;
border-left:5px solid var(--gold);
margin-bottom:20px;
}

.instructor-title{
color:var(--gold);
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
font-size:.9rem;
margin-bottom:10px;
}

</style>
</head>

<body>

<footer>
<div class="footer-content">
<h3 style="color:var(--gold);margin-bottom:20px;">Brigadier General Charles Young JROTC Battalion</h3>

<p>Mason County High School</p>
<p>Building Leaders Since 2015</p>

<div class="social-links">
<a href="#">F</a>
<a href="#">T</a>

</div>

<p style="margin-top:20px;opacity:.8;font-size:.9rem;">

</p>

<p style="margin-top:20px;opacity:.6;font-size:.8rem;">

</p>

</div>
</footer>

</body>
</html>
